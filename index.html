<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c10">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tasks">
  <title>Task Manager</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Navegação topo (desktop) -->
    <header class="top-nav" id="top-nav">
      <div class="top-nav-inner">
        <span class="app-brand">Tasks</span>
        <nav class="top-tabs">
          <button class="tab-btn active" data-tab="dia">Dia</button>
          <button class="tab-btn" data-tab="semana">Semana</button>
          <button class="tab-btn" data-tab="mes">Mês</button>
          <button class="tab-btn" data-tab="gestao">Gestão</button>
        </nav>
        <div class="top-actions">
          <!-- Drive (desktop) — exibido via JS se CLIENT_ID configurado -->
          <button class="drive-btn" id="btn-drive" title="Conectar Google Drive">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
            <span id="drive-label">Conectar Drive</span>
          </button>
          <button class="icon-btn" id="btn-export" title="Exportar backup">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="icon-btn" id="btn-import" title="Importar backup">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 5 17 10"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Barra de busca (sempre visível, mobile e desktop) -->
    <div class="search-bar" id="search-bar">
      <div class="search-bar-inner">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" class="search-input" placeholder="Buscar itens..." autocomplete="off" spellcheck="false">
        <button class="search-clear" id="search-clear" style="display:none" aria-label="Limpar busca">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- Drive bar (mobile) — exibido via JS se CLIENT_ID configurado -->
    <div class="drive-bar" id="drive-bar">
      <button class="drive-bar-btn" id="btn-drive-mobile">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
        <span id="drive-bar-label">Conectar Google Drive</span>
      </button>
      <span class="drive-bar-status" id="drive-bar-status"></span>
    </div>

    <!-- Conteúdo principal -->
    <main id="main-content" class="main-content">
      <div id="view-dia"    class="view active"></div>
      <div id="view-semana" class="view"></div>
      <div id="view-mes"    class="view"></div>
      <div id="view-gestao" class="view"></div>
      <div id="view-busca"  class="view"></div>
    </main>

    <!-- Navegação inferior (mobile) -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="tab-btn active" data-tab="dia">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Dia</span>
      </button>
      <button class="tab-btn" data-tab="semana">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>
        <span>Semana</span>
      </button>
      <button class="tab-btn" data-tab="mes">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><rect x="7" y="14" width="3" height="3" rx="0.5" fill="currentColor"/><rect x="14" y="14" width="3" height="3" rx="0.5" fill="currentColor"/></svg>
        <span>Mês</span>
      </button>
      <button class="tab-btn" data-tab="gestao">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="8" rx="1"/></svg>
        <span>Gestão</span>
      </button>
    </nav>

    <!-- FAB -->
    <button class="fab" id="fab" aria-label="Adicionar item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Modal -->
    <div class="modal-overlay hidden" id="modal-overlay">
      <div class="modal" id="modal"></div>
    </div>

    <!-- Toasts -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Input file oculto para importação -->
    <input type="file" id="import-file-input" accept=".json" style="display:none">
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
